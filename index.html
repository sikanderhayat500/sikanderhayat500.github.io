<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tally Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0a;
            color: #00ff88;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            border: 2px solid #00ff88;
            border-radius: 20px;
            padding: 30px 40px;
            text-align: center;
            box-shadow: 0 0 30px #00ff8855;
            max-width: 400px;
            width: 100%;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 15px;
            text-shadow: 0 0 10px #00ff88;
        }
        .name {
            font-size: 20px;
            color: #ffffff;
            margin-bottom: 15px;
        }
        .time {
            font-size: 16px;
            color: #00ccff;
            margin-bottom: 10px;
        }
        .battery {
            font-size: 16px;
            color: #00ff88;
            margin-bottom: 15px;
        }
        .quote {
            font-size: 16px;
            color: #ff4444;
            margin: 20px 0;
        }
        .status {
            font-size: 16px;
            color: #00ff88;
            margin-bottom: 20px;
        }
        .footer {
            font-size: 12px;
            color: #888888;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚡ TALLY TRACKER ⚡</h1>
        <div class="name">SIKANDER HAYAT</div>
        <div class="time" id="time">Loading...</div>
        <div class="battery">Battery: 43%</div>
        <div class="quote">Apna Kaam Apni Marzi</div>
        <div class="status">ONLINE MODE ACTIVE</div>
       <p>📞 0314-5587856</p>
        <div class="footer">Made in Risalpur Cantt| Pakistan</div>
    </div>

    <script>
        function updateTime() {
            const now = new Date();
            const options = { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            };
            document.getElementById('time').textContent = now.toLocaleDateString('en-US', options);
        }
        updateTime();
        setInterval(updateTime, 1000);
    </script>
</body>
</html>
