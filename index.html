<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tally Mafia Pro</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f0f2f5;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #28a745;
            margin-bottom: 5px;
        }
        #totalAmount {
            color: #28a745;
            text-align: center;
            margin: 10px 0;
            font-size: 24px;
            font-weight: bold;
        }
        #searchBox {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #28a745;
            border-radius: 5px;
            box-sizing: border-box;
        }
        input, button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
        }
        .btn-primary {
            background: #28a745;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-primary:hover {
            background: #218838;
        }
        .khata-item {
            background: #f9f9f9;
            padding: 15px;
            margin: 10px 0;
            border-radius: 5px;
            border-left: 4px solid #28a745;
        }
        .btn-group button {
            width: 48%;
            margin: 5px 1%;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .btn-whatsapp { background: #25D366; color: white; }
        .btn-delete { background: #dc3545; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Tally Mafia Pro</h1>
        <h2 id="totalAmount">Total Udhaar: Rs 0</h2>
        
        <input type="text" id="searchBox" placeholder="Naam se khata dhoondo..." onkeyup="searchKhata()">
        
        <input type="text" id="name" placeholder="Customer Ka Naam">
        <input type="number" id="amount" placeholder="Udhaar Ki Raqam">
        <button class="btn-primary" onclick="addKhata()">Khata Add Karo</button>
        
        <div id="khataList"></div>
    </div>

    <script>
        let khataList = JSON.parse(localStorage.getItem('khataList')) || [];
        
        displayKhatas();
        updateTotal();

        function addKhata() {
            const name = document.getElementById('name').value;
            const amount = parseInt(document.getElementById('amount').value);
            
            if(name && amount) {
                khataList.push({name, amount, date: new Date().toLocaleDateString()});
                localStorage.setItem('khataList', JSON.stringify(khataList));
                displayKhatas();
                updateTotal();
                document.getElementById('name').value = '';
                document.getElementById('amount').value = '';
                document.getElementById('searchBox').value = '';
            } else {
                alert('Naam aur Raqam dono likho bhai');
            }
        }

        function displayKhatas(listToShow = khataList) {
            const list = document.getElementById('khataList');
            list.innerHTML = '';
            
            if(listToShow.length === 0) {
                list.innerHTML = '<p style="text-align:center;color:#666;">Koi khata nahi mila</p>';
                return;
            }
            
            listToShow.forEach((khata) => {
                const originalIndex = khataList.indexOf(khata);
                list.innerHTML += `
                    <div class="khata-item">
                        <strong>${khata.name}</strong> - Rs ${khata.amount.toLocaleString()}
                        <br><small>Date: ${khata.date}</small>
                        <div class="btn-group">
                            <button class="btn-whatsapp" onclick="sendWhatsApp('${khata.name}', ${khata.amount})">WhatsApp</button>
                            <button class="btn-delete" onclick="deleteKhata(${originalIndex})">Delete</button>
                        </div>
                    </div>
                `;
            });
        }

        function updateTotal() {
            let total = 0;
            khataList.forEach(khata => {
                total += khata.amount;
            });
            document.getElementById('totalAmount').innerText = 
                `Total Udhaar: Rs ${total.toLocaleString()}`;
        }

        function searchKhata() {
            const search = document.getElementById('searchBox').value.toLowerCase();
            const filtered = khataList.filter(khata => 
                khata.name.toLowerCase().includes(search)
            );
            displayKhatas(filtered);
        }

        function deleteKhata(index) {
            if(confirm('Pakka delete karna hai?')) {
                khataList.splice(index, 1);
                localStorage.setItem('khataList', JSON.stringify(khataList));
                displayKhatas();
                updateTotal();
                document.getElementById('searchBox').value = '';
            }
        }

        function sendWhatsApp(name, amount) {
            const msg = `Salam ${name} bhai, apke zimme Rs ${amount.toLocaleString()} udhaar hai. Meherbani kar ke wapis kar dein. - Tally Mafia Pro`;
            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
        }
    </script>
</body>
</html>
